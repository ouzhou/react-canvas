<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" aria-hidden="true">
  <!-- Canvas frame -->
  <rect x="4" y="4" width="32" height="32" rx="6" stroke="currentColor" stroke-width="2.5" />
  <!-- Pixel grid (4 corners + center accent = canvas drawing) -->
  <rect x="10" y="10" width="5" height="5" rx="1" fill="currentColor" opacity="0.35" />
  <rect x="25" y="10" width="5" height="5" rx="1" fill="currentColor" opacity="0.35" />
  <rect x="10" y="25" width="5" height="5" rx="1" fill="currentColor" opacity="0.35" />
  <rect x="25" y="25" width="5" height="5" rx="1" fill="currentColor" opacity="0.35" />
  <rect x="17.5" y="17.5" width="5" height="5" rx="1" fill="currentColor" opacity="0.95" />
</svg>
