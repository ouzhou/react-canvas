<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkbox · Avatar · Switch — 线框方向</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        background: #0f1419;
        color: #e6edf3;
      }
      body {
        margin: 0;
        padding: 24px;
        max-width: 920px;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
      }
      p.sub {
        color: #8b949e;
        margin: 0 0 24px;
        font-size: 0.9rem;
      }
      .split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 720px) {
        .split {
          grid-template-columns: 1fr;
        }
      }
      .mockup {
        border: 1px solid #30363d;
        border-radius: 8px;
        overflow: hidden;
        background: #161b22;
      }
      .mockup-header {
        padding: 8px 12px;
        font-size: 12px;
        color: #8b949e;
        border-bottom: 1px solid #30363d;
      }
      .mockup-body {
        padding: 16px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .row:last-child {
        margin-bottom: 0;
      }
      /* wireframe primitives */
      .w-box {
        width: 18px;
        height: 18px;
        border: 2px solid #58a6ff;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        color: #58a6ff;
      }
      .w-box.on {
        background: #388bfd33;
      }
      .w-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 2px dashed #8b949e;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: #8b949e;
      }
      .w-switch {
        width: 44px;
        height: 24px;
        border-radius: 12px;
        border: 2px solid #30363d;
        position: relative;
        background: #21262d;
      }
      .w-switch.on {
        border-color: #388bfd;
        background: #388bfd44;
      }
      .w-knob {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #c9d1d9;
      }
      .w-switch.on .w-knob {
        left: 22px;
        background: #58a6ff;
      }
      .label {
        font-size: 14px;
        color: #c9d1d9;
      }
      .hint {
        margin-top: 20px;
        padding: 12px;
        border-left: 3px solid #388bfd;
        background: #388bfd14;
        font-size: 13px;
        color: #8b949e;
      }
    </style>
  </head>
  <body>
    <h1>Canvas UI：Checkbox / Avatar / Switch</h1>
    <p class="sub">
      线框仅表示布局与层级关系，非最终像素。用于对齐「组件在画布里的占位与组合方式」。
    </p>

    <div class="split">
      <div class="mockup">
        <div class="mockup-header">A · Checkbox + 标签（横向）</div>
        <div class="mockup-body">
          <div class="row">
            <span class="w-box on">✓</span>
            <span class="label">已选</span>
          </div>
          <div class="row">
            <span class="w-box"></span>
            <span class="label">未选</span>
          </div>
        </div>
      </div>
      <div class="mockup">
        <div class="mockup-header">B · Avatar（圆形占位 + 可选叠层）</div>
        <div class="mockup-body">
          <div class="row">
            <span class="w-avatar">A</span>
            <span class="label">首字母 / 占位</span>
          </div>
          <div class="row">
            <span class="w-avatar" style="border-style: solid; border-color: #388bfd">?</span>
            <span class="label">图片失败 fallback（示意）</span>
          </div>
        </div>
      </div>
    </div>

    <div class="mockup" style="margin-top: 16px">
      <div class="mockup-header">C · Switch（滑块轨 + 状态）</div>
      <div class="mockup-body">
        <div class="row">
          <span class="w-switch"><span class="w-knob"></span></span>
          <span class="label">关</span>
        </div>
        <div class="row">
          <span class="w-switch on"><span class="w-knob"></span></span>
          <span class="label">开</span>
        </div>
      </div>
    </div>

    <div class="hint">
      打开本页仅用于对齐视觉层级；规格里还会约定：与
      <code>CanvasToken</code> 的映射、受控/非受控、以及 <code>/ui/*</code> 文档与 Playground 案例。
    </div>
  </body>
</html>
